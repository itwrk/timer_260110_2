<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ライフリッスンタイマー</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
  <div id="completionEffect" class="completion-effect-overlay">
    <canvas id="confettiCanvas"></canvas>
    <div id="completionMessage" class="completion-message-popup"></div>
  </div>

  <div id="iconModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>アイコンを選択</h2>
      <div class="icon-grid" id="presetIconGrid"></div>
    </div>
  </div>

  <div class="container">
    <div class="header-container">
      <h1><i class="fas fa-headphones"></i> ライフリッスンタイマー</h1>
      <a href="edit.html" class="edit-link"><i class="fas fa-edit"></i> タスク編集</a>
    </div>

    <!-- CSV操作 -->
    <div class="csv-controls">
      <input type="file" id="importCsvInput" accept=".csv" />
      <button id="loadCsvButton" class="csv-btn"><i class="fas fa-file-import"></i> 読み込む</button>
      <button id="exportCsvButton" class="csv-btn"><i class="fas fa-file-export"></i> CSV エクスポート</button>
    </div>

    <!-- タスクボタン群 -->
    <div class="button-group" id="taskButtons"></div>

    <!-- ★ メインアクティブエリア（PC/スマホ共通横レイアウト） -->
    <div class="active-task-area" id="activeTaskArea">
      <div id="currentTaskInfo" class="task-info-card">
        <!-- リング -->
        <div class="timer-ring-wrap" id="inlineRingWrap">
          <svg width="120" height="120" viewBox="0 0 120 120" id="inlineRingSvg">
            <circle id="inlineRingBg" cx="60" cy="60" r="52"
              stroke="#eee" stroke-width="9" fill="none"/>
            <circle id="inlineRingFg" cx="60" cy="60" r="52"
              stroke="#3498db" stroke-width="9" fill="none"
              stroke-dasharray="326.73" stroke-dashoffset="0"
              stroke-linecap="round"/>
          </svg>
          <div class="timer-ring-label" id="inlineTimerLabel">--:--</div>
        </div>
        <!-- ステップ情報（右側） -->
        <div class="step-info-col" id="stepInfoCol">
          <div class="task-status-message"><i class="fas fa-info-circle"></i> タスクを選択してください</div>
        </div>
      </div>
    </div>

    <!-- ★ 実行中メモ入力欄（タスク実行中のみ表示） -->
    <div id="sessionMemoArea" class="session-memo-area hidden">
      <label class="session-memo-label"><i class="fas fa-pencil-alt"></i> メモ</label>
      <input type="text" id="sessionMemoInput" class="session-memo-input"
        placeholder="気づいたこと、感じたことを入力…（タスク完了時に自動保存）"
        oninput="currentSessionMemo = this.value">
    </div>

    <!-- コントロール -->
    <div class="settings-container hidden" id="timerSettings">
      <label class="toggle-switch">
        <input type="checkbox" id="autoAdvanceToggle" checked>
        <span class="slider round"></span>
        <span class="toggle-label">自動で次のステップへ進む</span>
      </label>
    </div>

    <div class="controls hidden" id="timerControls">
      <button id="prevButton" class="control-btn"><i class="fas fa-step-backward"></i> 前へ</button>
      <button id="pauseResumeButton" class="control-btn pause-main"><i class="fas fa-pause"></i> 一時停止</button>
      <button id="nextButton" class="control-btn"><i class="fas fa-step-forward"></i> 次へ</button>
      <button id="endButton" class="control-btn stop-btn"><i class="fas fa-stop"></i> 終了</button>
    </div>

    <!-- ステップリスト -->
    <div class="sequence-container">
      <h3 id="sequenceTitle"><i class="fas fa-list-ol"></i> 実行予定のタスク</h3>
      <p class="drag-hint"><i class="fas fa-grip-vertical"></i> ドラッグして並び替え可能</p>
      <div class="sequence-list-container">
        <div class="sequence-list" id="sequenceList"></div>
      </div>
    </div>

    <!-- 新規ステップ追加（横並びレイアウト） -->
    <div class="add-step-section hidden" id="addStepSection">
      <div class="section-header">
        <i class="fas fa-plus-circle"></i> 新規ステップ追加
      </div>
      <div class="section-content">
        <div class="step-add-grid">
          <div class="step-add-row">
            <label class="step-add-label">項目名</label>
            <input type="text" id="newStepName" placeholder="項目名" class="form-input step-add-input">
          </div>
          <div class="step-add-row">
            <label class="step-add-label">読み上げ</label>
            <input type="text" id="newStepText" placeholder="読み上げるテキスト" class="form-input step-add-input">
          </div>
          <div class="step-add-row">
            <label class="step-add-label">メモ</label>
            <input type="text" id="newStepMemo" placeholder="メモ（任意）" class="form-input step-add-input">
          </div>
          <div class="step-add-row">
            <label class="step-add-label">秒数</label>
            <div class="time-input-group">
              <input type="number" id="newStepSeconds" value="30" min="1" class="form-input number-input">
              <span class="unit">秒</span>
              <div class="quick-time-buttons">
                <button type="button" class="qt-btn" onclick="document.getElementById('newStepSeconds').value=30">30秒</button>
                <button type="button" class="qt-btn" onclick="document.getElementById('newStepSeconds').value=60">1分</button>
                <button type="button" class="qt-btn" onclick="document.getElementById('newStepSeconds').value=180">3分</button>
              </div>
            </div>
          </div>
        </div>
        <button id="addStepButton" class="action-btn" style="margin-top:10px;"><i class="fas fa-plus"></i> ステップを追加</button>
      </div>
    </div>

    <!-- 実行結果ログ -->
    <div class="results-container">
      <div class="results-header">
        <h3><i class="fas fa-history"></i> 実行結果ログ</h3>
        <div class="results-buttons">
          <button id="copyResultsButton" class="copy-btn"><i class="fas fa-copy"></i> コピー</button>
          <button id="clearResultsButton" class="clear-btn"><i class="fas fa-trash"></i> 消去</button>
        </div>
      </div>
      <div class="log-tabs">
        <button class="log-tab-btn active" data-view="detail">詳細ログ</button>
        <button class="log-tab-btn" data-view="summary">サマリー</button>
        <button class="log-tab-btn" data-view="memo"><i class="fas fa-pencil-alt"></i> メモ</button>
      </div>
      <table id="resultsTable">
        <thead>
          <tr id="resultsTableHeader"><th>日時</th><th>経過時間</th><th>内容</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- PC用タイマーは廃止（timerDisplayはscript.jsが参照するためダミーで残す） -->
  <div style="display:none;">
    <div class="timer" id="timerDisplay">--:--</div>
  </div>

  <script src="common.js"></script>
  <script src="script.js"></script>
</body>
</html>
